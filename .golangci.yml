# ABOUTME: golangci-lint v2 configuration for CI linting
# ABOUTME: Defines linters and rules for code quality checks
version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  settings:
    gocyclo:
      min-complexity: 25
    staticcheck:
      # S* only = the old gosimple linter. SA/ST/QF stay off, matching the
      # pre-v2 config where staticcheck was intentionally not enabled.
      checks:
        - S*
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - errcheck
          - gocyclo
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
